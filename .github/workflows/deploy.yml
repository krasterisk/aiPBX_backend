name: Deploy Backend to Production

on:
  push:
    branches: [master]
    paths-ignore:
      - "*.md"
      - ".docs/**"
  # Ручной запуск с выбором сервера
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - aipbxnet_production
          - aipbxorg_production
          - aipbxru_production

jobs:
  # ─── Step 1: Determine which servers to deploy ──
  prepare:
    name: Prepare Deploy Matrix
    runs-on: ubuntu-latest
    outputs:
      servers: ${{ steps.set-matrix.outputs.servers }}
    steps:
      - name: Set server matrix
        id: set-matrix
        run: |
          # Ручной запуск — используем выбранный target
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.target }}" == "all" ]]; then
              echo 'servers=["aipbxnet_production","aipbxorg_production","aipbxru_production"]' >> $GITHUB_OUTPUT
            else
              echo 'servers=["${{ github.event.inputs.target }}"]' >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # Push — парсим commit message
          MSG="${{ github.event.head_commit.message }}"

          if [[ "$MSG" == *"[deploy all]"* ]]; then
            echo "Deploy to all servers"
            echo 'servers=["aipbxnet_production","aipbxorg_production","aipbxru_production"]' >> $GITHUB_OUTPUT
          elif [[ "$MSG" == *"[deploy:1]"* ]]; then
            echo "Deploy only to aipbxnet"
            echo 'servers=["aipbxnet_production"]' >> $GITHUB_OUTPUT
          elif [[ "$MSG" == *"[deploy:2]"* ]]; then
            echo "Deploy only to aipbxorg"
            echo 'servers=["aipbxorg_production"]' >> $GITHUB_OUTPUT
          elif [[ "$MSG" == *"[deploy:3]"* ]]; then
            echo "Deploy only to aipbxru"
            echo 'servers=["aipbxru_production"]' >> $GITHUB_OUTPUT
          else
            echo "No deploy tag found, skipping deployment"
            echo 'servers=[]' >> $GITHUB_OUTPUT
          fi

  # ─── Step 2: Deploy backend to servers ───────
  deploy:
    name: Deploy Backend (${{ matrix.server }})
    needs: [prepare]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: ${{ fromJSON(needs.prepare.outputs.servers) }}
      fail-fast: false
    environment: ${{ matrix.server }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            echo "Starting backend deployment to ${{ matrix.server }}..."

            # ── Pull latest backend code ──
            echo "Pulling backend..."
            git config --global --add safe.directory /app/aiPBX_backend
            sudo chown -R $(whoami):$(whoami) /app/aiPBX_backend
            cd /app/aiPBX_backend && git pull origin master

            cd /app

            # ── Rebuild & restart only backend ──
            echo "Building and deploying backend..."
            sudo docker compose -f docker-compose.production.yml --env-file .env.production up -d \
              --build \
              --force-recreate backend

            # ── Start GPU services (only on aipbxnet / deploy:1) ──
            # VRAM budget (GTX 1080 Ti, 11GB):
            #   Whisper large-v3 INT8: ~4.5 GB  (analytics STT — always resident)
            #   OmniVoice TTS INT8:    ~3.5 GB  (Pipeline B TTS — always resident)
            #   Gemma 4 E4B (Ollama):  ~3.0 GB  (Pipeline B LLM — unloads after idle)
            #   Peak (all loaded):     ~11 GB ⚠ (brief overlap during voice calls)
            #   Typical (no calls):    ~8.0 GB ✅
            if [[ "${{ matrix.server }}" == "aipbxnet_production" ]]; then
              # Docker daemon has iptables:false on this server (UFW compat).
              # Ensure MASQUERADE exists so containers can reach the internet.
              echo "Ensuring Docker NAT (MASQUERADE) rule..."
              sudo iptables -t nat -C POSTROUTING -s 172.18.0.0/16 -o ens1 -j MASQUERADE 2>/dev/null || \
                sudo iptables -t nat -A POSTROUTING -s 172.18.0.0/16 -o ens1 -j MASQUERADE

              echo "Starting Whisper GPU container (used for analytics STT)..."
              sudo docker compose -f docker-compose.production.yml --env-file .env.production --profile gpu up -d \
                --force-recreate whisper

              echo "Starting Ollama container..."
              sudo docker compose -f docker-compose.production.yml --env-file .env.production --profile gpu-full up -d \
                --force-recreate ollama

              echo "Building and starting OmniVoice TTS container (Pipeline B)..."
              sudo docker compose -f docker-compose.production.yml --env-file .env.production --profile gpu-full up -d \
                --build --force-recreate omnivoice-tts

              sleep 10
              echo "Pulling Gemma 4 E4B model (Pipeline B LLM)..."
              sudo docker exec app-ollama-1 ollama pull gemma4:e4b || echo "Model pull skipped (may already exist)"
              echo "Pulling nomic-embed-text for RAG embeddings..."
              sudo docker exec app-ollama-1 ollama pull nomic-embed-text || echo "Embedding model pull skipped"
            fi

            # ── Wait for health checks ──
            echo "Waiting for backend to start..."
            sleep 15

            # ── Verify deployment ──
            echo "Checking health..."
            HEALTH=$(sudo docker inspect --format='{{.State.Health.Status}}' app-backend-1 2>/dev/null || echo "unknown")
            if [ "$HEALTH" = "healthy" ]; then
              echo "Health check passed!"
            else
              echo "Health check status: $HEALTH, checking containers..."
              sudo docker compose -f docker-compose.production.yml --env-file .env.production ps
              sudo docker compose -f docker-compose.production.yml --env-file .env.production logs --tail=50 backend
              exit 1
            fi

            # ── Cleanup ──
            # Удаляем все неиспользуемые образы (не только dangling)
            sudo docker image prune -a -f
            # Чистим build cache, оставляя 2GB для кэширования
            sudo docker builder prune -f --keep-storage=2GB
            # Логируем состояние диска для мониторинга
            echo "Docker disk usage after cleanup:"
            sudo docker system df
            echo "Backend deployment to ${{ matrix.server }} successful!"