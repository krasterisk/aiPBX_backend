services:
  nodejs:
    build: .
    restart: unless-stopped
    networks:
      - app-network
    environment:
      - NODE_ENV=production
    volumes:
      - ./:/app/aiPBX_backend
      - node_modules:/app/aiPBX_backend/node_modules
    ports:
      - "7002:7002"
      - "3032:3032"
      - "3033:3033"

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    restart: unless-stopped
    profiles:
      - gpu
    networks:
      - app-network
    environment:
      - ASR_MODEL=large-v3
      - ASR_ENGINE=faster_whisper
      - ASR_QUANTIZATION=int8
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

